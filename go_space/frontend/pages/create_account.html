<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOSPACE - Create Account</title>
    <link rel="stylesheet" href="C:\Users\Z BOOK\go-space\go_space\frontend\css\create account.css">
</head>
<body>

    <div class="wrapper">
        <div class="login-card">
            <span class="brand-logo">Gospace</span>

            <h2>Create Account</h2>
            <p class="subtitle">Join our secure architectural infrastructure.</p>

            <form action="#">
                <div class="input-group">
                    <label for="first name">firstname</label>
                    <input type="text" id="firstname" placeholder="enter your firt name" required>
                </div>

                 <div class="input-group">
                    <label for="second name">secondname</label>
                    <input type="text" id="secondname" placeholder="enter your second name"  required>
                </div>

                <div class="input-group">
                    <label for="email">Email <address></address></label>
                    <input type="email" id="email" placeholder="name@gmail.com" required>
                </div>

                <div class="input-group">
                    <label for="password">Create password</label>
                    <input type="password" id="password" placeholder="********" required>
                </div>

                <div class="input-group">
                    <label for="confirm-password">Comfirm password</label>
                    <input type="password" id="confirm-password" placeholder="********" required>
                </div>
                 <button onclick="window.location.href='test.html'" class="sign-in-btn">Create Account</button>
            </form>
        </div>

    </div>

</body>
</html>
