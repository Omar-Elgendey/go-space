<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOSPACE - Create Account</title>
    <link rel="stylesheet" href="/frontend/css/creatAccount.css">
</head>
<body>

    <div class="wrapper">
        <div class="login-card">
            <span class="brand-logo">Gospace</span>

            <h2>Create Account</h2>

            <form action="/creatAccount" method="POST">
                <div class="input-group">
                    <label for="first name">First Name</label>
                    <input type="text" id="firstname" name="firstname" placeholder="enter your firt name" required>
                </div>

                 <div class="input-group">
                    <label for="second name">Second Name</label>
                    <input type="text" id="secondname" name="secondname" placeholder="enter your second name"  required>
                </div>

                <div class="input-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="name@gmail.com" required>
                </div>

                <div class="input-group">
                    <label for="phone">Phone</label>
                    <input type="tel" id="phone" name="phone" placeholder="Phone">
                </div>

                <div class="input-group">
                    <label for="password">Create Password</label>
                    <input type="password" id="password" name="password" placeholder="********" required>
                </div>

                <div class="input-group">
                    <label for="confirm-password">Confirm Password</label>
                    <input type="password" id="confirm_password" name="confirm_password" placeholder="********" required>
                </div>

                <button type="submit" class="sign-in-btn">Create Account</button>
            </form>
        </div>

    </div>

</body>
</html>
