<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOSPACE - Create Account</title>
    <link rel="stylesheet" href="creat account.css">
</head>
<body>

    <div class="wrapper">
        <div class="login-card">
            <span class="brand-logo">GOSPACE</span>

            <h2>Create Account</h2>
            <p class="subtitle">Join our secure architectural infrastructure.</p>

            <form action="#">
                <div class="input-group">
                    <label for="first name">FIRST NAME</label>
                    <input type="text" id="firstname" placeholder="enter your firt name" required>
                </div>

                 <div class="input-group">
                    <label for="second name">SECOND NAME</label>
                    <input type="text" id="secondname" placeholder="enter your second name"  required>
                </div>

                <div class="input-group">
                    <label for="email">EMAIL ADDRESS</label>
                    <input type="email" id="email" placeholder="name@gmail.com" required>
                </div>

                <div class="input-group">
                    <label for="password">CREATE PASSWORD</label>
                    <input type="password" id="password" placeholder="********" required>
                </div>

                <div class="input-group">
                    <label for="confirm-password">CONFIRM PASSWORD</label>
                    <input type="password" id="confirm-password" placeholder="********" required>
                </div>

                <button type="submit" class="sign-in-btn">Create Account</button>
            </form>
        </div>

    </div>

</body>
</html>
